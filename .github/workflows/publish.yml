name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package.json version
        run: |
          PKG_VERSION="v$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")"
          if [ "$PKG_VERSION" != "${{ github.ref_name }}" ]; then
            echo "::error::Tag ${{ github.ref_name }} does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: pnpm install

      - run: pnpm test

      - run: pnpm build

      - name: Run example
        run: |
          cd examples/tests
          pnpm install
          pnpm run analyze

      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update demo branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          REPORT="examples/tests/esm-imports-report.html"
          TMPDIR=$(mktemp -d)
          cp "$REPORT" "$TMPDIR/index.html"

          git checkout --orphan demo-tmp
          git rm -rf .
          cp "$TMPDIR/index.html" index.html
          git add index.html
          git commit -m "Update demo for ${{ github.ref_name }}"
          git branch -M demo-tmp demo
          git push origin demo --force

          rm -rf "$TMPDIR"
